appId: com.hotkeyai.app
productName: Hotkey AI
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - '!**/.vscode/*'
  - '!src/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
asarUnpack:
  - resources/**
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
