name: Release

# Push a version tag (e.g. v1.0.4) to build the Windows installer on a real
# Windows runner (no wine needed) and upload it — plus latest.yml, which
# electron-updater reads — to a single DRAFT GitHub Release. Review it and
# click "Publish release" to ship the update.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # allow the built-in token to create the release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # Build the installer + update metadata WITHOUT publishing. electron-
      # builder's own GitHub publisher races when creating the draft (each
      # uploaded file can spawn its own draft), so we build here and publish
      # once, atomically, below.
      - run: npx electron-builder --win --publish never

      # Create ONE draft release with all artifacts in a single call.
      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/*.exe dist/*.blockmap dist/latest.yml \
            --draft \
            --title "${{ github.ref_name }}" \
            --notes "Automated build of ${{ github.ref_name }}."
