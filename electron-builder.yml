appId: com.hotkeyai.app
productName: Hotkey AI
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - '!**/.vscode/*'
  - '!src/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
asarUnpack:
  - resources/**
win:
  # NSIS only. A second target (e.g. portable) makes electron-builder publish
  # twice in one run, and its non-atomic "find-or-create release" then spawns a
  # duplicate draft each release. NSIS is also the only target that auto-updates.
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
# GitHub Releases is the update feed: the build uploads the installer plus
# latest.yml here, and electron-updater in the app reads latest.yml from the
# same public repo (no auth needed).
publish:
  provider: github
  owner: Droid-box
  repo: hotkey-ai
